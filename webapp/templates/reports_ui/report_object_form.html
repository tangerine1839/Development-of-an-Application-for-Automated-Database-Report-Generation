<!DOCTYPE html>
<html>
<head>
    <title>Параметры отчёта по объектам</title>
</head>
<body>
    <h1>Отчёт по объектам</h1>
    <form method="post" novalidate>
        {% csrf_token %}

        {% if error_message %}
    <div style="color: red; font-size: 14px; margin-bottom: 10px;">
        <p>{{ error_message }}</p>
    </div>
{% endif %}

        <p>
            {{ form.codes.label_tag }}
            <br>
            {{ form.codes }}
        </p>
         <p>
            {{ form.manager.label_tag }}
            <br>
            {{ form.manager }}
        </p>

        <p>
            {{ form.excel_fields.label_tag }}
            <br>
            {{ form.excel_fields }}
        </p>

        <button type="submit">Сформировать отчёт</button>
    </form>
    <a href="{% url 'reports_ui:index' %}">← Вернуться к списку отчётов</a>

    <script>
        const form = document.querySelector('form');
        if (form) {
            form.addEventListener('submit', function() {
                const errorDiv = document.querySelector('[style*="color: red"]');
                if (errorDiv) {
                    errorDiv.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
