<!DOCTYPE html>
<html>
<head>
    <title>Отчёт по пунктам проверки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        form {
            max-width: 500px;
            margin: 20px 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="number"], input[type="text"], select {
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .error-message {
            color: red;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #ffeeee;
            border-left: 3px solid red;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            color: #4CAF50;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        ul {
            list-style: none;
            padding-left: 0;
        }
        ul li {
            margin-bottom: 5px;
        }
        ul li label {
            font-weight: normal;
            display: inline;
        }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>Отчёт по пунктам проверки</h1>

    <form method="post" novalidate>
        {% csrf_token %}

        {% if error_message %}
            <div class="error-message">
                <p>{{ error_message }}</p>
            </div>
        {% endif %}

        <div class="form-group">
            <p>{{ form.inspection_id.label_tag }}</p>
            {{ form.inspection_id }}
        </div>

        <div class="form-group">
            <p>{{ form.extra_fields.label_tag }}</p>
            {{ form.extra_fields }}
        </div>

        <button type="submit">Сформировать отчёт</button>
    </form>

    <a href="{% url 'reports_ui:index' %}">← Вернуться к списку отчётов</a>

    <script>
        const form = document.querySelector('form');
        if (form) {
            form.addEventListener('submit', function() {
                const errorDiv = document.querySelector('.error-message');
                if (errorDiv) {
                    errorDiv.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
