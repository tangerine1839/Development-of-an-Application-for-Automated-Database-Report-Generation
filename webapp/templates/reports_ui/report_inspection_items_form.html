<!DOCTYPE html>
<html>
<head>
    <title>Отчёт по пунктам проверки</title>
</head>
<body>
    <h1>Отчёт по пунктам проверки</h1>
    <form method="post" novalidate>
        {% csrf_token %}

        {% if error_message %}
            <div style="color: red; font-size: 14px; margin-bottom: 10px;">
                <p>{{ error_message }}</p>
            </div>
        {% endif %}

        <p>{{ form.inspection_id.label_tag }}<br>{{ form.inspection_id }}</p>
        <p>{{ form.extra_fields.label_tag }}<br>{{ form.extra_fields }}</p>

        <button type="submit">Сформировать отчёт</button>
    </form>
    <a href="{% url 'reports_ui:index' %}">← Вернуться к списку отчётов</a>

    <script>
        const form = document.querySelector('form');
        if (form) {
            form.addEventListener('submit', function() {
                const errorDiv = document.querySelector('[style*="color: red"]');
                if (errorDiv) {
                    errorDiv.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
